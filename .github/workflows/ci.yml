name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/studia2026-app:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build builder stage
        run: docker build --target builder -t studia2026-builder .

      - name: Run test stage
        run: docker build --target test -t studia2026-test .

      - name: Build final image
        run: docker build --target final -t $IMAGE_NAME .

      - name: Push final image
        if: github.event_name == 'push'
        run: docker push $IMAGE_NAME