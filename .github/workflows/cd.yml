## wersja workflow bez serwera CD, tylko z publikacją obrazu do GHCR, a potem ręcznym wdrożeniem na serwerze

name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pull image
        run: echo "docker compose pull"

      - name: Start services
        run: echo "docker compose up -d"

      - name: Restart application
        run: echo "docker compose restart app nginx"